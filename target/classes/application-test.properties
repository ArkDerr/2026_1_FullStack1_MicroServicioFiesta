spring.application.name=AppFiesta-test

# Base de datos temporal: se crea al iniciar los tests y se elimina al terminar.
spring.datasource.url=jdbc:h2:mem:fiestasdb;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# La configuración de seguridad necesita que esta propiedad exista.
# Usa un valor exclusivo para pruebas; no copies el secreto real.
jwt.secret=clave-de-pruebas-con-longitud-suficiente-123456
